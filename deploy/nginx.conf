# Nginx server block for vavendano.com
# Copy to /etc/nginx/sites-available/victoravendano and symlink into sites-enabled:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/victoravendano
#   sudo ln -s /etc/nginx/sites-available/victoravendano /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Run certbot AFTER this file is enabled and DNS is pointing at the VM's static IP —
# certbot will rewrite this file to add the SSL server block automatically:
#   sudo certbot --nginx -d vavendano.com -d www.vavendano.com

server {
    listen 80;
    listen [::]:80;
    server_name vavendano.com www.vavendano.com;

    root /var/www/victoravendano/dist;
    index index.html;

    # Static site — try the exact file/dir, then Astro's clean-URL html, then 404.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/xml application/xml;

    location ~* \.(?:css|js|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
